version: '3.8'

services:
  app:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: saas-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/data
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/saas.db
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: saas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - app

volumes:
  app-data:
  nginx-certs:
