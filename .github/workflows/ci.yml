name: CI - Test & Build

on:
  push:
    branches: [main, master, 'claude/**']
    paths: ['saas-app/**']
  pull_request:
    branches: [main, master]
    paths: ['saas-app/**']

defaults:
  run:
    working-directory: saas-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        run: npm run db:setup
        env:
          DATABASE_PATH: ./data/test.db

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DATABASE_PATH: ./data/test.db
          SESSION_SECRET: test-secret
          STRIPE_SECRET_KEY: sk_test_fake_for_ci
          STRIPE_WEBHOOK_SECRET: whsec_fake_for_ci

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: saas-app/playwright-report/
          retention-days: 7

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (multi-arch for Pi)
        uses: docker/build-push-action@v6
        with:
          context: saas-app
          file: saas-app/deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: saas-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
