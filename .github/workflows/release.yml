# Release workflow - creates GitHub releases with .alfredworkflow package
# Triggered on version tags
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v4.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@c541c155eee45413f5b09a52248675b1a2f3b754 # v2.31.1
        with:
          php-version: '8.2'
          extensions: curl, json, xml, simplexml

      - name: PHP syntax check
        run: |
          php -l src/scripts/devdocs.php
          php -l src/scripts/conf.php
          php -l src/scripts/workflows.php

      - name: Build .alfredworkflow package
        run: |
          cd src
          zip -r ../DevDocs.alfredworkflow . \
            -x "*.DS_Store" \
            -x "cache/*" \
            -x "docs/*" \
            -x "scripts/vendor/rodneyrehm/plist/tests/*" \
            -x "scripts/vendor/rodneyrehm/plist/examples/*"

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          body: |
            ## Alfred DevDocs ${{ steps.tag.outputs.version }}

            ### Installation
            1. Download `DevDocs.alfredworkflow` below
            2. Double-click to install in Alfred
            3. Use `cdoc:add` to add your first documentation

            ### Changes
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.version }}) for details.
          files: DevDocs.alfredworkflow
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
